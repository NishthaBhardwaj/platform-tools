service:
  type: ClusterIP

persistence:
  enabled: false

elasticsearch:
  persistence:
    enabled: false

jdbcOverwrite:
  enable: false

resources:
  requests:
    memory: "512Mi"
    cpu: "200m"
  limits:
    memory: "1Gi"
    cpu: "500m"

env:
  - name: SONAR_ES_BOOTSTRAP_CHECKS_DISABLE
    value: "true"
