apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sonarqube
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://SonarSource.github.io/helm-chart-sonarqube
    chart: sonarqube
    targetRevision: 10.5.0

    helm:
      values: |
        service:
          type: ClusterIP

        persistence:
          enabled: false

        elasticsearch:
          persistence:
            enabled: false

        postgresql:
          enabled: false

        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"

        env:
          - name: SONAR_ES_BOOTSTRAP_CHECKS_DISABLE
            value: "true"

  destination:
    server: https://kubernetes.default.svc
    namespace: sonarqube

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true